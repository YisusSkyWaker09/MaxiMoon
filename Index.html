<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Love Galaxy</title>
    <style>
        :root {
            --mario-pink: #ff4d6d;
            --luma-yellow: #fff347;
            --space-dark: #050510;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--space-dark);
            font-family: 'Arial Rounded MT Bold', sans-serif;
        }

        /* FONDO ESPACIAL */
        #galaxy-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #050510 100%);
            z-index: 0; /* Lo ponemos en la base */
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px white; /* Les damos un pequeño brillo */
            z-index: 1;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* INTRO */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: clip-path 1.5s cubic-bezier(0.77, 0, 0.175, 1);
            clip-path: circle(100% at 50% 50%);
            cursor: pointer;
        }

        #intro-overlay.hide { clip-path: circle(0% at 50% 50%); }

        .grand-star {
            width: 130px;
            filter: drop-shadow(0 0 20px gold);
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* TARJETA */
        #main-galaxy {
            position: relative;
            z-index: 10; /* Por encima de las estrellas */
            height: 100vh; display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s;
        }

        #main-galaxy.visible { opacity: 1; }

        .love-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 35px; border-radius: 40px; text-align: center;
            color: white; width: 85%; max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .photo-container {
            width: 140px; height: 140px; margin: 0 auto 20px;
            border-radius: 50%; padding: 5px;
            background: linear-gradient(45deg, #fff347, #ff4d6d, #4cc9f0);
            animation: rotate-border 4s linear infinite;
        }

        .photo-container img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid #000;
        }

        @keyframes rotate-border {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .btn-bits {
            background: var(--mario-pink); color: white; border: none;
            padding: 12px 25px; border-radius: 30px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
            box-shadow: 0 5px 15px var(--mario-pink);
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="Luma - Super Mario Galaxy - GilvaSilver.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-overlay" onclick="start()">
        <img src="Maxiestrella_MKT.png" class="grand-star">
        <p style="color: white; margin-top: 20px; letter-spacing: 2px;">TOCA LA ESTRELLA</p>
    </div>

    <div id="galaxy-container"></div>

    <div id="main-galaxy">
        <div class="love-card">
            <div class="photo-container">
                <img src="MaxiMoon.jpeg" alt="Ella">
            </div>
            <h1 style="color: var(--luma-yellow);">¡Eres mi Superestrella!</h1>
            <p id="typed-text"></p>
            <button class="btn-bits" onclick="spawnBits(event)">¡Lanzar Destellos!</button>
        </div>
    </div>

    <script>
        // GENERADOR DE ESTRELLAS MEJORADO
        function createStars() {
            const galaxy = document.getElementById('galaxy-container');
            const count = 150; // Cantidad de estrellas

            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Tamaño aleatorio entre 1px y 3px
                const size = Math.random() * 3 + 1 + 'px';
                star.style.width = size;
                star.style.height = size;

                // Posición aleatoria
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';

                // Duración de parpadeo aleatoria
                const duration = Math.random() * 3 + 2 + 's';
                star.style.setProperty('--d', duration);

                galaxy.appendChild(star);
            }
        }

        // Ejecutar creación de estrellas al cargar la página
        window.onload = createStars;

        function start() {
            // Música
            const music = document.getElementById('bg-music');
            music.volume = 0.3;
            music.play().catch(() => {});

            document.getElementById('intro-overlay').classList.add('hide');
            document.getElementById('main-galaxy').classList.add('visible');
            typeWriter();
        }

        const msg = "En todo este vasto universo, tuve la suerte de encontrarte a ti. ❤️";
        let charI = 0;
        function typeWriter() {
            if (charI < msg.length) {
                document.getElementById("typed-text").innerHTML += msg.charAt(charI);
                charI++;
                setTimeout(typeWriter, 50);
            }
        }

        function spawnBits(e) {
            for (let j = 0; j < 15; j++) {
                const bit = document.createElement('div');
                bit.innerHTML = '✨';
                bit.style.position = 'fixed';
                bit.style.left = e.clientX + 'px';
                bit.style.top = e.clientY + 'px';
                bit.style.color = 'gold';
                bit.style.pointerEvents = 'none';
                bit.style.zIndex = '100';
                document.body.appendChild(bit);

                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 120 + 40;
                bit.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
                ], { duration: 1000 }).onfinish = () => bit.remove();
            }
        }
    </script>
</body>

</html>
